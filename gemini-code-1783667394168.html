<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小二數學：寶可夢觸控雙人對戰！</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            color: #333;
            overflow: hidden;
        }
        #game-container {
            width: 1050px;
            background: rgba(255, 255, 255, 0.95);
            border: 6px solid #333;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .battle-arena {
            display: flex;
            justify-content: space-between;
            background: #e0f7fa;
            padding: 15px 25px;
            border-radius: 20px;
            position: relative;
            height: 250px;
            border: 3px solid #00acc1;
            overflow: hidden;
        }
        .pokemon-card {
            width: 40%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }
        .pokemon-name {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
            background: #fff;
            padding: 2px 20px;
            border-radius: 20px;
            border: 2px solid #333;
        }
        .pokemon-img {
            width: 130px;
            height: 130px;
            margin: 5px 0;
            object-fit: contain;
        }
        .hp-bar-container {
            width: 100%;
            background: #ddd;
            border-radius: 10px;
            height: 22px;
            overflow: hidden;
            border: 2px solid #555;
        }
        .hp-bar {
            height: 100%;
            background: #4caf50;
            width: 100%;
            transition: width 0.2s, background-color 0.2s;
        }
        .hp-text {
            font-size: 18px;
            font-weight: bold;
            margin-top: 5px;
        }
        .combo-dots {
            font-size: 20px;
            margin-top: 2px;
        }
        
        /* 雙人觸控作答區 */
        .quiz-arena {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 25px;
        }
        .player-quiz-box {
            width: 50%;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            box-sizing: border-box;
        }
        .player-quiz-box.p1-box { background: #e8f5e9; border: 4px solid #4caf50; }
        .player-quiz-box.p2-box { background: #e3f2fd; border: 4px solid #2196f3; }
        
        .quiz-header {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px dashed #999;
        }
        .question-text {
            font-size: 46px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            color: #111;
            height: 60px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        /* 放大按鈕方便觸控，移除鍵盤提示 */
        .btn-option {
            padding: 20px 10px;
            font-size: 28px;
            font-weight: bold;
            background: #fff;
            border: 3px solid #ccc;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #bbb;
            transition: none; /* 觸控不需 hover 動畫 */
            -webkit-tap-highlight-color: transparent;
        }
        .p1-box .btn-option { border-color: #81c784; box-shadow: 0 4px 0 #66bb6a; }
        .p2-box .btn-option { border-color: #90caf9; box-shadow: 0 4px 0 #42a5f5; }

        /* 觸控按下的視覺反饋 */
        .btn-option:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 動畫特效 */
        .attack-left { animation: slideRight 0.4s ease-in-out; }
        .attack-right { animation: slideLeft 0.4s ease-in-out; }
        .hurt { animation: shake 0.4s ease-in-out; filter: brightness(1.4) sepia(1) hue-rotate(-50deg); }
        
        @keyframes slideRight {
            0% { transform: translateX(0); }
            50% { transform: translateX(80px) scale(1.1); }
            100% { transform: translateX(0); }
        }
        @keyframes slideLeft {
            0% { transform: translateX(0); }
            50% { transform: translateX(-80px) scale(1.1); }
            100% { transform: translateX(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }
        .floating-damage {
            position: absolute;
            font-size: 42px;
            font-weight: bold;
            color: #d32f2f;
            text-shadow: 2px 2px 0 #fff;
            animation: floatUp 0.8s forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            50% { transform: translateY(-40px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-80px) scale(1); }
        }
        
        #vs-text {
            font-size: 45px;
            font-weight: bold;
            font-style: italic;
            color: #ffeb3b;
            text-shadow: 3px 3px 0 #000;
            align-self: center;
        }
        #victory-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 54px;
            z-index: 100;
        }
        #restart-btn {
            margin-top: 30px;
            padding: 20px 50px;
            font-size: 28px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 #e65100;
        }
        #restart-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="battle-arena">
        <div id="p1-card" class="pokemon-card">
            <div id="p1-name" class="pokemon-name">玩家 1</div>
            <img id="p1-img" class="pokemon-img" src="" alt="p1">
            <div class="hp-bar-container"><div id="p1-hp-bar" class="hp-bar"></div></div>
            <div id="p1-hp-text" class="hp-text">300 / 300 HP</div>
            <div id="p1-combo" class="combo-dots">印章: ⚪ ⚪</div>
        </div>
        
        <div id="vs-text">VS</div>
        <div id="damage-layer" style="position:absolute; width:100%; height:100%; top:0; left:0; pointer-events:none;"></div>

        <div id="p2-card" class="pokemon-card">
            <div id="p2-name" class="pokemon-name">玩家 2</div>
            <img id="p2-img" class="pokemon-img" src="" alt="p2">
            <div class="hp-bar-container"><div id="p2-hp-bar" class="hp-bar"></div></div>
            <div id="p2-hp-text" class="hp-text">300 / 300 HP</div>
            <div id="p2-combo" class="combo-dots">印章: ⚪ ⚪</div>
        </div>
    </div>

    <div class="quiz-arena">
        <div class="player-quiz-box p1-box">
            <div class="quiz-header">✋ 【玩家 1】點擊正確答案</div>
            <div id="p1-question" class="question-text">-</div>
            <div class="options-grid">
                <button class="btn-option" id="p1-opt-0" onclick="handleTouch('p1', 0)">-</button>
                <button class="btn-option" id="p1-opt-1" onclick="handleTouch('p1', 1)">-</button>
                <button class="btn-option" id="p1-opt-2" onclick="handleTouch('p1', 2)">-</button>
                <button class="btn-option" id="p1-opt-3" onclick="handleTouch('p1', 3)">-</button>
            </div>
        </div>

        <div class="player-quiz-box p2-box">
            <div class="quiz-header">✋ 【玩家 2】點擊正確答案</div>
            <div id="p2-question" class="question-text">-</div>
            <div class="options-grid">
                <button class="btn-option" id="p2-opt-0" onclick="handleTouch('p2', 0)">-</button>
                <button class="btn-option" id="p2-opt-1" onclick="handleTouch('p2', 1)">-</button>
                <button class="btn-option" id="p2-opt-2" onclick="handleTouch('p2', 2)">-</button>
                <button class="btn-option" id="p2-opt-3" onclick="handleTouch('p2', 3)">-</button>
            </div>
        </div>
    </div>
</div>

<div id="victory-screen">
    <div id="victory-text">🎉 某某 獲得了勝利！ 🎉</div>
    <button id="restart-btn" onclick="initGame()">再戰一局</button>
</div>

<script>
    // 寶可夢名單
    const pokemonDatabase = [
        { name: "皮卡丘", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" },
        { name: "噴火龍", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png" },
        { name: "水箭龜", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/9.png" },
        { name: "妙蛙種子", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" },
        { name: "伊布", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png" },
        { name: "甲賀忍蛙", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/658.png" },
        { name: "路卡利歐", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/448.png" },
        { name: "耿鬼", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/94.png" },
        { name: "卡比獸", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/143.png" },
        { name: "波加曼", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/393.png" }
    ];

    let gameState = {
        p1: { name: "", img: "", hp: 300, maxHp: 300, combo: 0, currentAnswer: 0, startTime: 0, options: [], isLocked: false },
        p2: { name: "", img: "", hp: 300, maxHp: 300, combo: 0, currentAnswer: 0, startTime: 0, options: [], isLocked: false },
        isGameOver: false
    };

    function initGame() {
        document.getElementById('victory-screen').style.display = 'none';
        gameState.isGameOver = false;

        let idx1 = Math.floor(Math.random() * pokemonDatabase.length);
        let idx2 = Math.floor(Math.random() * pokemonDatabase.length);
        while(idx1 === idx2) { idx2 = Math.floor(Math.random() * pokemonDatabase.length); }

        gameState.p1 = { name: pokemonDatabase[idx1].name, img: pokemonDatabase[idx1].img, hp: 300, maxHp: 300, combo: 0, isLocked: false };
        gameState.p2 = { name: pokemonDatabase[idx2].name, img: pokemonDatabase[idx2].img, hp: 300, maxHp: 300, combo: 0, isLocked: false };

        document.getElementById('p1-name').innerText = "【P1】" + gameState.p1.name;
        document.getElementById('p1-img').src = gameState.p1.img;
        document.getElementById('p2-name').innerText = "【P2】" + gameState.p2.name;
        document.getElementById('p2-img').src = gameState.p2.img;

        updateUi();
        generateQuestion('p1');
        generateQuestion('p2');
    }

    function updateUi() {
        ['p1', 'p2'].forEach(p => {
            let data = gameState[p];
            let pct = Math.max(0, (data.hp / data.maxHp) * 100);
            let bar = document.getElementById(`${p}-hp-bar`);
            bar.style.width = pct + "%";
            document.getElementById(`${p}-hp-text`).innerText = `${data.hp} / ${data.maxHp} HP`;
            
            if(pct > 50) bar.style.backgroundColor = '#4caf50';
            else if(pct > 20) bar.style.backgroundColor = '#ff9800';
            else bar.style.backgroundColor = '#f44336';

            let dots = data.combo === 1 ? "🔴 ⚪" : data.combo === 2 ? "🔴 🔴" : "⚪ ⚪";
            document.getElementById(`${p}-combo`).innerText = "答對印章: " + dots;
        });
    }

    function generateQuestion(player) {
        if(gameState.isGameOver) return;

        let isMultiplication = Math.random() > 0.5;
        let num1, num2, questionText, answer;
        const factors = [2, 3, 4, 5, 10]; 

        if (isMultiplication) {
            num1 = factors[Math.floor(Math.random() * factors.length)];
            num2 = Math.floor(Math.random() * 9) + 1;
            questionText = `${num1} × ${num2} = ?`;
            answer = num1 * num2;
        } else {
            let factor1 = factors[Math.floor(Math.random() * factors.length)];
            let factor2 = Math.floor(Math.random() * 9) + 1;
            questionText = `${factor1 * factor2} ÷ ${factor1} = ?`;
            answer = factor2;
        }

        gameState[player].currentAnswer = answer;
        document.getElementById(`${player}-question`).innerText = questionText;

        let options = new Set([answer]);
        while(options.size < 4) {
            let wrong = answer + (Math.floor(Math.random() * 7) - 3);
            if(wrong > 0 && wrong !== answer) options.add(wrong);
        }
        gameState[player].options = Array.from(options).sort(() => Math.random() - 0.5);

        for(let i=0; i<4; i++) {
            let btn = document.getElementById(`${player}-opt-${i}`);
            btn.innerText = gameState[player].options[i];
            btn.style.backgroundColor = '#fff';
        }
        gameState[player].isLocked = false; // 解鎖按鈕，允許作答
        gameState[player].startTime = Date.now();
    }

    function handleTouch(player, index) {
        if (gameState.isGameOver || gameState[player].isLocked) return;
        
        // 立即鎖定該玩家按鈕，防止重複觸控觸發兩次
        gameState[player].isLocked = true; 
        
        let pData = gameState[player];
        let selectedVal = pData.options[index];
        let isCorrect = (selectedVal === pData.currentAnswer);
        let btn = document.getElementById(`${player}-opt-${index}`);

        if (isCorrect) {
            btn.style.backgroundColor = '#a5d6a7';
            pData.combo++;
            
            if (pData.combo >= 2) {
                let duration = (Date.now() - pData.startTime) / 1000;
                let damage = Math.round(20 - Math.min(10, Math.max(0, (duration - 2) * 3.3)));
                damage = Math.max(10, Math.min(20, damage));
                
                triggerAttack(player, damage);
                pData.combo = 0;
            }
            // 答對了，150毫秒後進入下一題
            setTimeout(() => { generateQuestion(player); updateUi(); }, 150);
        } else {
            btn.style.backgroundColor = '#ef9a9a';
            pData.combo = 0; 
            updateUi();
            // 答錯給予 500毫秒 懲罰時間（期間按鈕保持鎖定）
            setTimeout(() => { generateQuestion(player); }, 500);
        }
    }

    function triggerAttack(attacker, damage) {
        let opponent = (attacker === 'p1') ? 'p2' : 'p1';
        let attackerCard = document.getElementById(`${attacker}-card`);
        let opponentCard = document.getElementById(`${opponent}-card`);
        
        attackerCard.classList.add(attacker === 'p1' ? 'attack-left' : 'attack-right');
        
        setTimeout(() => {
            opponentCard.classList.add('hurt');
            gameState[opponent].hp = Math.max(0, gameState[opponent].hp - damage);
            
            showDamagePop(opponent, damage);
            updateUi();

            setTimeout(() => {
                attackerCard.classList.remove('attack-left', 'attack-right');
                opponentCard.classList.remove('hurt');
                
                if (gameState[opponent].hp <= 0 && !gameState.isGameOver) {
                    gameState.isGameOver = true;
                    showVictory(attacker);
                }
            }, 300);
        }, 150);
    }

    function showDamagePop(targetPlayer, dmg) {
        let layer = document.getElementById('damage-layer');
        let pop = document.createElement('div');
        pop.className = 'floating-damage';
        pop.innerText = `-${dmg} HP`;
        pop.style.left = (targetPlayer === 'p1') ? '20%' : '70%';
        pop.style.top = '35%';
        layer.appendChild(pop);
        setTimeout(() => pop.remove(), 800);
    }

    function showVictory(winner) {
        let winnerName = gameState[winner].name;
        document.getElementById('victory-text').innerText = `🎉 恭喜！${winnerName} 贏得了比賽！ 🎉`;
        document.getElementById('victory-screen').style.display = 'flex';
    }

    // 初始化啟動
    initGame();
</script>

</body>
</html>
